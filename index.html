<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adik Sayang Mas Ndak?</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #ffd6e7 0%, #ffb3c6 30%, #f9a8d4 60%, #fecdd3 100%);
      overflow: hidden;
      position: relative;
    }

    /* Floating hearts background */
    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .heart-float {
      position: absolute;
      font-size: 1.5rem;
      opacity: 0.25;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0.3; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 2px solid rgba(255,255,255,0.7);
      border-radius: 32px;
      padding: 48px 56px 52px;
      max-width: 480px;
      width: 92vw;
      text-align: center;
      box-shadow: 0 20px 60px rgba(219,112,147,0.25), 0 4px 16px rgba(0,0,0,0.08);
      animation: cardIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes cardIn {
      from { transform: scale(0.7) translateY(40px); opacity: 0; }
      to   { transform: scale(1) translateY(0);      opacity: 1; }
    }

    /* Title */
    .title {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 900;
      color: #c0395a;
      text-shadow: 0 2px 8px rgba(192,57,90,0.18);
      margin-bottom: 28px;
      line-height: 1.3;
      letter-spacing: -0.3px;
    }
    .title .heart-icon { display: inline-block; animation: pulse 1.4s ease infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.25);} }

    /* Image area */
    .img-wrapper {
      position: relative;
      display: inline-block;
      cursor: pointer;
      margin-bottom: 8px;
      transition: transform 0.18s;
    }
    .img-wrapper:hover { transform: scale(1.04); }
    .img-wrapper:active { transform: scale(0.97); }

    .char-img {
      width: 200px;
      height: 200px;
      object-fit: contain;
      border-radius: 20px;
      display: block;
      transition: opacity 0.25s, transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }

    .img-wrapper.bounce .char-img {
      animation: imgBounce 0.45s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes imgBounce {
      0%   { transform: scale(1); }
      40%  { transform: scale(0.85) rotate(-5deg); }
      70%  { transform: scale(1.12) rotate(3deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    /* Tap hint */
    .tap-hint {
      font-size: 0.78rem;
      color: #c0395a;
      opacity: 0.65;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
      transition: opacity 0.4s;
    }

    /* Subtitle / caption */
    .caption {
      font-size: 0.92rem;
      font-weight: 700;
      color: #d63f6e;
      min-height: 1.4em;
      margin-bottom: 28px;
      transition: all 0.35s;
      opacity: 0.88;
    }

    /* Buttons row */
    .buttons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 60px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1),
                  font-size 0.4s cubic-bezier(0.34,1.56,0.64,1),
                  padding 0.4s,
                  box-shadow 0.22s,
                  opacity 0.4s;
      white-space: nowrap;
      letter-spacing: 0.3px;
      outline: none;
    }

    /* YES button */
    #yesBtn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      font-size: 1.25rem;
      padding: 14px 36px;
      box-shadow: 0 6px 24px rgba(34,197,94,0.4);
    }
    #yesBtn:hover { transform: scale(1.06); box-shadow: 0 8px 28px rgba(34,197,94,0.5); }
    #yesBtn:active { transform: scale(0.96); }

    /* NO button */
    #noBtn {
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      color: #fff;
      font-size: 1rem;
      padding: 11px 28px;
      box-shadow: 0 4px 16px rgba(239,68,68,0.35);
    }
    #noBtn:hover { transform: scale(1.04); }
    #noBtn:active { transform: scale(0.96); }

    /* Celebration overlay */
    .celebrate {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(255,182,213,0.15);
      pointer-events: none;
    }
    .celebrate.active { display: block; }
    .confetti-piece {
      position: absolute;
      width: 12px; height: 12px;
      border-radius: 3px;
      opacity: 0;
      animation: confettifall 2s ease-in forwards;
    }
    @keyframes confettifall {
      0%   { opacity: 1; transform: translateY(-20px) rotate(0deg);   }
      100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
    }

    /* Shake animation for NO buttons */
    .shake {
      animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
    }
    @keyframes shake {
      10%,90%  { transform: translateX(-3px); }
      20%,80%  { transform: translateX(4px);  }
      30%,50%,70% { transform: translateX(-5px); }
      40%,60%  { transform: translateX(5px);  }
    }

    /* Yes screen overlay */
    .yes-message {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
    .yes-message.active { display: flex; }
    .yes-message h2 {
      font-size: 2.2rem;
      font-weight: 900;
      color: #c0395a;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    .yes-message p {
      font-size: 1.1rem;
      color: #d63f6e;
      font-weight: 700;
    }
    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>

<!-- Floating hearts -->
<div class="hearts-bg" id="heartsBg"></div>

<!-- Confetti celebration -->
<div class="celebrate" id="celebrate"></div>

<div class="card" id="mainCard">

  <!-- Title -->
  <h1 class="title">
    Adik sayang mas ndak? <span class="heart-icon">💕</span>
  </h1>

  <!-- Main content (question state) -->
  <div id="questionState">
    <!-- Image -->
    <div class="img-wrapper" id="imgWrapper" onclick="onImageClick()" title="Klik aku!">
      <img id="charImg" class="char-img" src="images/neutral.png" alt="Karakter lucu"/>
    </div>

    <p class="tap-hint" id="tapHint">✨ klik gambarnya dulu!</p>
    <p class="caption" id="caption">Hayo jawab jujur ya... 🥺</p>

    <!-- Buttons -->
    <div class="buttons">
      <button class="btn" id="yesBtn" onclick="onYes()">Iya dong! 💖</button>
      <button class="btn" id="noBtn" onclick="onNo()">Ngga 😤</button>
    </div>
  </div>

  <!-- Yes state -->
  <div class="yes-message" id="yesState">
    <img id="happyImg" class="char-img" style="width:220px;height:220px;margin-bottom:8px" src="images/happy.png" alt="Senang!"/>
    <h2>Yeayyy!! 🎉💖</h2>
    <p>Makasih adik sayang!! Mas seneng banget!! 🥰</p>
    <p style="font-size:2rem;letter-spacing:6px">💕💕💕</p>
  </div>

</div>

<script>
  // ── Image states ──────────────────────────────────────────────────
  // Images cycle when the user clicks the character.
  // Filenames map to images/  folder inside project.
  const imageStates = [
    { src: 'images/neutral.png',    caption: 'Hayo jawab jujur ya... 🥺' },
    { src: 'images/sad.png',        caption: 'Aku nunggu jawabannya nih... 😔' },
    { src: 'images/crying.png',     caption: 'Jangan lama-lama dongg... 😢' },
    { src: 'images/desperate.png',  caption: 'Tolong jangan bilang ngga... 🙏' },
  ];

  let imgIndex      = 0;   // which image is shown
  let noCount       = 0;   // how many times NO was clicked
  let yesSize       = 1.0; // scale factor for YES button (font-size multiplier)
  let noSize        = 1.0; // scale factor for NO button
  const MIN_NO      = 0.35;
  const MAX_YES_EM  = 2.4;  // rem

  // ── Floating hearts ──────────────────────────────────────────────
  const heartsBg = document.getElementById('heartsBg');
  const HEARTS   = ['💖','💗','💓','💝','💞','🌸','✨'];
  for (let i = 0; i < 18; i++) {
    const h = document.createElement('span');
    h.className = 'heart-float';
    h.textContent = HEARTS[Math.floor(Math.random() * HEARTS.length)];
    h.style.left   = Math.random() * 100 + 'vw';
    h.style.animationDuration = (5 + Math.random() * 8) + 's';
    h.style.animationDelay   = (Math.random() * 8) + 's';
    h.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
    heartsBg.appendChild(h);
  }

  // ── Image click ──────────────────────────────────────────────────
  function onImageClick() {
    imgIndex = (imgIndex + 1) % imageStates.length;
    updateImage();
    // Hide tap hint after first click
    document.getElementById('tapHint').style.opacity = '0';
  }

  function updateImage(state) {
    const data    = state || imageStates[imgIndex];
    const img     = document.getElementById('charImg');
    const caption = document.getElementById('caption');
    const wrapper = document.getElementById('imgWrapper');

    img.style.opacity = '0';
    setTimeout(() => {
      img.src = data.src;
      img.style.opacity = '1';
    }, 150);

    caption.textContent = data.caption;

    // bounce animation
    wrapper.classList.remove('bounce');
    void wrapper.offsetWidth; // reflow
    wrapper.classList.add('bounce');
  }

  // ── No button ────────────────────────────────────────────────────
  const noLabels = [
    'Ngga 😤',
    'Yakin ngga? 🤔',
    'Beneran ngga? 😠',
    'Kok ngga... 😭',
    'Pleaseee... 🙏',
    'Huuuu ngga... 💔',
    'Akhirnya iya kan? 🥺',
  ];

  function onNo() {
    noCount++;
    const noBtn  = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');

    // Shrink NO, grow YES
    noSize  = Math.max(MIN_NO,  noSize  - 0.12);
    yesSize = Math.min(MAX_YES_EM, yesSize + 0.18);

    const noPx  = Math.round(16 * noSize);
    const noPad = Math.max(4, Math.round(11 * noSize));

    noBtn.style.fontSize  = noPx + 'px';
    noBtn.style.padding   = noPad + 'px ' + Math.round(28 * noSize) + 'px';
    noBtn.style.opacity   = Math.max(0.4, noSize);

    yesBtn.style.fontSize = yesSize + 'rem';
    yesBtn.style.padding  = Math.round(14 * (yesSize / 1.25)) + 'px ' + Math.round(36 * (yesSize / 1.25)) + 'px';

    // Update NO label
    const labelIdx = Math.min(noCount, noLabels.length - 1);
    noBtn.textContent = noLabels[labelIdx];

    // Shake NO button
    noBtn.classList.remove('shake');
    void noBtn.offsetWidth;
    noBtn.classList.add('shake');

    // Change image state based on noCount
    if (noCount === 1) imgIndex = 1;
    else if (noCount === 2) imgIndex = 2;
    else if (noCount >= 3) imgIndex = 3;
    updateImage();

    // Hide No button when tiny enough
    if (noSize <= MIN_NO) {
      noBtn.style.pointerEvents = 'none';
    }
  }

  // ── Yes button ───────────────────────────────────────────────────
  function onYes() {
    document.getElementById('questionState').style.display = 'none';
    document.getElementById('yesState').classList.add('active');
    launchCelebration();
  }

  // ── Confetti ─────────────────────────────────────────────────────
  function launchCelebration() {
    const el     = document.getElementById('celebrate');
    el.classList.add('active');
    el.innerHTML = '';
    const colors = ['#ff6b9d','#ff85a1','#ffd6e7','#ffe44d','#ff4b6a','#a855f7','#22c55e'];
    for (let i = 0; i < 80; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left            = Math.random() * 100 + 'vw';
      c.style.top             = '-20px';
      c.style.background      = colors[Math.floor(Math.random() * colors.length)];
      c.style.width           = (8 + Math.random() * 14) + 'px';
      c.style.height          = (8 + Math.random() * 14) + 'px';
      c.style.animationDelay  = (Math.random() * 1.5) + 's';
      c.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
      el.appendChild(c);
    }
    setTimeout(() => {
      el.classList.remove('active');
      el.innerHTML = '';
    }, 3500);
  }
</script>
</body>
</html>
